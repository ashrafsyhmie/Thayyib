<span class="material-symbols-outlined text-4xl text-primary mb-2" style="font-variation-settings: 'FILL' 1;">

<h1 class="font-headline-lg text-headline-lg text-primary text-center">Thayyib</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 text-center">Stay halal audit-ready</p>
</div>
<form action="#" class="w-full flex flex-col gap-stack-md" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="email">Email Address</label>
<input class="w-full px-3 py-2 bg-surface-container-lowest border border-border-light rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline-variant transition-colors" id="email" name="email" placeholder="user@company.com" required="" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot password?</a>
</div>
<input class="w-full px-3 py-2 bg-surface-container-lowest border border-border-light rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface placeholder-outline-variant transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-center mt-2 mb-4">
<input class="w-4 h-4 text-primary bg-surface-container-lowest border-border-light rounded focus:ring-primary focus:ring-2" id="remember" name="remember" type="checkbox"/>
<label class="ml-2 font-body-md text-body-md text-on-surface-variant" for="remember">Remember this device</label>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 rounded-lg hover:bg-primary-container hover:text-on-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                    Login
                </button>
</form>
<div class="mt-stack-lg text-center font-body-md text-body-md text-on-surface-variant">

<a class="text-primary hover:underline font-label-md text-label-md" href="#">Contact Support</a>
</div>
</div>
